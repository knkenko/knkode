name: Release

# Trigger manually: gh workflow run build-release.yml --ref v2.0.0
# The --ref flag sets GITHUB_REF_NAME to the tag for the release job.
on:
  workflow_dispatch:

permissions: {}

jobs:
  build:
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            args: --target universal-apple-darwin
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "${{ matrix.platform == 'mac' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}"

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build frontend
        run: bun run build

      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — generates .sig files alongside updater bundles
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS signing & notarization — identity auto-detected from certificate
          APPLE_CERTIFICATE: ${{ matrix.platform == 'mac' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ matrix.platform == 'mac' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.platform == 'mac' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_TEAM_ID || '' }}
        with:
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: "${{ join(fromJSON(steps.tauri-build.outputs.artifactPaths), '\n') }}"
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( \
            -name "*.dmg" \
            -o -name "*.app.tar.gz" \
            -o -name "*.app.tar.gz.sig" \
            -o -name "*.exe" \
            -o -name "*.msi" \
            -o -name "*.nsis.zip" \
            -o -name "*.nsis.zip.sig" \
          \) -exec cp {} release-files/ \;
          echo "Release files:" && ls -lh release-files/

      - name: Generate latest.json for updater
        run: |
          TAG="${GITHUB_REF_NAME}"
          node -e "
            const fs = require('fs');
            const path = require('path');
            const dir = 'release-files';
            const tag = '${TAG}';
            const files = fs.readdirSync(dir);
            const platforms = {};

            // macOS — universal binary serves both architectures
            const macSig = files.find(f => f.endsWith('.app.tar.gz.sig'));
            const macBundle = files.find(f => f.endsWith('.app.tar.gz') && !f.endsWith('.sig'));
            if (macSig && macBundle) {
              const sig = fs.readFileSync(path.join(dir, macSig), 'utf8').trim();
              const url = 'https://github.com/knkenko/knkode/releases/download/' + tag + '/' + macBundle;
              platforms['darwin-aarch64'] = { signature: sig, url };
              platforms['darwin-x86_64'] = { signature: sig, url };
            }

            // Windows
            const winSig = files.find(f => f.endsWith('.nsis.zip.sig'));
            const winBundle = files.find(f => f.endsWith('.nsis.zip') && !f.endsWith('.sig'));
            if (winSig && winBundle) {
              const sig = fs.readFileSync(path.join(dir, winSig), 'utf8').trim();
              const url = 'https://github.com/knkenko/knkode/releases/download/' + tag + '/' + winBundle;
              platforms['windows-x86_64'] = { signature: sig, url };
            }

            const latest = {
              version: tag,
              notes: '',
              pub_date: new Date().toISOString(),
              platforms
            };

            fs.writeFileSync(path.join(dir, 'latest.json'), JSON.stringify(latest, null, 2));
            console.log('Generated latest.json with platforms:', Object.keys(platforms).join(', '));
          "

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" release-files/* --clobber
          else
            gh release create "$TAG" release-files/* --draft --generate-notes
          fi
