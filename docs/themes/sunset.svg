<svg width="220" height="148" viewBox="0 0 220 148" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="su-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffc040" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#e04028" stop-opacity="0.08"/>
      <stop offset="80%" stop-color="#110808" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="su-ember" cx="0.5" cy="0.2" r="0.6">
      <stop offset="0%" stop-color="#e8a040" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#110808" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="su-clip"><rect width="220" height="148" rx="10"/></clipPath>
  </defs>
  <g clip-path="url(#su-clip)">
    <!-- Background -->
    <rect width="220" height="148" fill="#110808"/>
    <!-- Warm gradient -->
    <rect width="220" height="148" fill="url(#su-grad)"/>
    <!-- Ember glow -->
    <rect width="220" height="148" fill="url(#su-ember)"/>
    <!-- Terminal content -->
    <text font-family="monospace" font-size="10" font-weight="500">
      <tspan x="16" y="34" fill="#f0d0a0" opacity="0.9">workspace</tspan>
      <tspan x="16" y="50" fill="#f0d0a0" opacity="0.4">~/projects/ember</tspan>
      <tspan x="16" y="66" fill="#e8a040" opacity="0.7">2 panes active</tspan>
    </text>
    <!-- Branch + PR badges -->
    <rect x="16" y="78" width="54" height="17" rx="9" fill="#e8a040" fill-opacity="0.14"/>
    <text x="43" y="90" font-family="monospace" font-size="8" fill="#e8a040" text-anchor="middle" font-weight="500">main</text>
    <rect x="76" y="78" width="40" height="17" rx="9" fill="#e04028" fill-opacity="0.14"/>
    <text x="96" y="90" font-family="monospace" font-size="8" fill="#e04028" text-anchor="middle" font-weight="500">#92</text>
    <!-- Status bar -->
    <rect x="0" y="120" width="220" height="28" fill="#110808"/>
    <!-- Top glow line -->
    <line x1="0" y1="120" x2="220" y2="120" stroke="#e8a040" stroke-opacity="0.2"/>
    <text font-family="monospace" font-size="9" font-weight="600">
      <tspan x="12" y="138" fill="#f0d0a0" opacity="0.8">SUNSET</tspan>
      <tspan x="64" y="138" fill="#e8a040" opacity="0.15">|</tspan>
      <tspan x="74" y="138" fill="#f0d0a0" opacity="0.4">~/ember</tspan>
      <tspan x="150" y="138" fill="#e8a040" opacity="0.5">>_</tspan>
    </text>
    <!-- Border -->
    <rect width="220" height="148" rx="10" fill="none" stroke="#e04028" stroke-opacity="0.1" stroke-width="1"/>
  </g>
</svg>
